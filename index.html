<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolVerse</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#09090f;
color:white;
padding-bottom:90px;
}

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:32px;
font-weight:bold;
}

.logo span{
color:#1da1ff;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
background:#1a1a1a;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
}

.hero{
margin:15px;
background:#111;
border-radius:25px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,140,255,.2);
}

.hero img{
width:100%;
display:block;
}

.hero-content{
padding:20px;
}

.badge{
display:inline-block;
background:#1da1ff;
padding:8px 15px;
border-radius:20px;
font-size:14px;
margin-bottom:15px;
}

.hero h2{
font-size:30px;
}

.search{
margin:20px 15px;
}

.search input{
width:100%;
padding:15px;
border:none;
outline:none;
background:#151515;
color:white;
border-radius:15px;
}

.tabs{
display:flex;
gap:10px;
padding:0 15px;
margin-bottom:20px;
}

.tab{
padding:12px 25px;
background:#1a1a1a;
border-radius:25px;
}

.active{
background:white;
color:black;
font-weight:bold;
}

.card{
margin:15px;
background:#111;
border-radius:25px;
padding:15px;
}

.label{
display:inline-block;
padding:8px 15px;
background:black;
border:1px solid #333;
border-radius:12px;
margin-bottom:15px;
}

.card img{
width:100%;
border-radius:15px;
margin-bottom:15px;
}

.card h3{
font-size:28px;
margin-bottom:10px;
}

.card p{
color:#aaa;
}

.bottom-nav{
position:fixed;
bottom:15px;
left:15px;
right:15px;
background:#151515;
border-radius:35px;
display:flex;
justify-content:space-around;
padding:18px;
backdrop-filter:blur(10px);
}

.bottom-nav a{
text-decoration:none;
color:white;
font-size:24px;
}
</style>
</head>
<body>

<header>
<div class="logo">Tool<span>Verse</span></div>
<div class="profile">🤖</div>
</header>

<div class="hero">
<img src="download-page-mobile-app-empty-screen-smartphone-you-app-download-app_100456-10225.jpg">

<div class="hero-content">
<div class="badge">FEATURED</div>
<h2>Welcome To ToolVerse</h2>
</div>
</div>

<div class="search">
<input type="text" placeholder="Search apps, tools, prompts...">
</div>

<div class="tabs">
<div class="tab active">🔥 All</div>
<div class="tab">📱 Apps</div>
<div class="tab">✨ Prompts</div>
</div>

<div class="card">
<div class="label">APP</div>

<img src="download-page-mobile-app-empty-screen-smartphone-you-app-download-app_100456-10225.jpg">

<h3>Harshit Portfolio</h3>

<p>
Hi, I'm Harshit 👋<br>
Student • Tech Enthusiast • Website Creator
</p>

</div>

<div class="card">
<div class="label">TOOL</div>
<h3>About Me</h3>
<p>
Learning GitHub Pages, Web Design and Technology.
</p>
</div>

<div class="bottom-nav">
<a href="#">🏠</a>
<a href="#">🔍</a>
<a href="#">📚</a>
</div>

</body>
</html>
